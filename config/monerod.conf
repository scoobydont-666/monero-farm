# monerod reference config — see ansible/roles/monero/templates/ for managed version
# This file is for documentation; Ansible manages the live config.

data-dir=/var/lib/monero
log-level=0
non-interactive=1

rpc-bind-ip=127.0.0.1
rpc-bind-port=18081
restricted-rpc=1
confirm-external-bind=1

p2p-bind-port=18080
out-peers=32
in-peers=48

zmq-pub=tcp://127.0.0.1:18082

prune-blockchain=1
db-sync-mode=safe:sync
