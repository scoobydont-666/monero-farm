# monerod reference config — observed live values, miniboss, 2026-05-10.
# AUTHORITATIVE source: ansible/roles/monero/templates/monerod.conf.j2.
# This file documents what is actually running; mirror changes to the template.

data-dir=/var/lib/monero
log-level=0
# non-interactive is on the CLI (systemd ExecStart), not in the file

rpc-bind-ip=127.0.0.1
rpc-bind-port=18081
# No restricted-rpc — RPC is loopback-only and exporters need admin methods
# (sync_info, get_connections, get_bans, get_alternate_chains).

p2p-bind-ip=0.0.0.0
p2p-bind-port=18080
out-peers=32
in-peers=48

# ZMQ — for P2Pool block notifications
zmq-pub=tcp://127.0.0.1:18083

# Pruning — DB on disk is already pruned. The flag is not passed at runtime
# because monerod respects the existing on-disk prune state. Set
# `monero_prune_blockchain: true` in inventory to force the flag on a fresh sync.

db-sync-mode=safe:sync
