# P2Pool launch flags reference — Ansible manages the live systemd unit
# Pool selection: nano (<1 KH/s), mini (1-10 KH/s), main (>10 KH/s)
#
# --host 127.0.0.1
# --rpc-port 18081
# --zmq-port 18082
# --wallet TODO_YOUR_PRIMARY_ADDRESS
# --stratum 0.0.0.0:3333
# --loglevel 2
# --mini                 # or --nano, or omit for main
# --data-dir /var/lib/p2pool
