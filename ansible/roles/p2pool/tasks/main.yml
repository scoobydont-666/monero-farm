---
# plan-approved: ansible-role-edit (plans/2026-05-10-monero-farm-hygiene.md, Group A residuals A3-A6)
# P2Pool role — install binary + deploy multiple sidechain instances

# --- Pre-flight: wallet must be set ---
- name: Assert monero_wallet_address is set and looks like a Monero primary address
  ansible.builtin.assert:
    that:
      - monero_wallet_address is defined
      - monero_wallet_address | length == 95
      - monero_wallet_address is match('^4[0-9A-HJ-NP-Za-km-z]{94}$')
    fail_msg: >-
      monero_wallet_address must be set in inventory (ansible/inventory/hosts.yml)
      to a valid Monero primary address (95 chars, starts with 4). Subaddresses
      (start with 8) and integrated addresses (95 chars + payment id) are not
      supported by P2Pool.
    success_msg: "Wallet address validated."
    quiet: true
  # plan-approved: ansible-role-edit -- task-4785 p2pool-env tag (isolate H-001 deploy)
  tags: ['p2pool-env']

# --- Binary installation ---
- name: Check current p2pool version
  ansible.builtin.command: "{{ p2pool_bin }} --version"
  register: p2pool_current_version
  changed_when: false
  failed_when: false

- name: Create p2pool install directory
  ansible.builtin.file:
    path: "{{ p2pool_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download p2pool release
  ansible.builtin.get_url:
    url: "{{ p2pool_download_url }}"
    dest: "/tmp/p2pool-v{{ p2pool_version }}-linux-x64.tar.gz"
    checksum: "sha256:{{ p2pool_sha256 }}"
    mode: "0644"
  when: p2pool_current_version.rc != 0 or ('v' + p2pool_version) not in p2pool_current_version.stdout

- name: Extract p2pool release
  ansible.builtin.unarchive:
    src: "/tmp/p2pool-v{{ p2pool_version }}-linux-x64.tar.gz"
    dest: /tmp/
    remote_src: true
  when: p2pool_current_version.rc != 0 or ('v' + p2pool_version) not in p2pool_current_version.stdout

- name: Install p2pool binary
  ansible.builtin.copy:
    src: "/tmp/p2pool-v{{ p2pool_version }}-linux-x64/p2pool"
    dest: "{{ p2pool_bin }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: p2pool_current_version.rc != 0 or ('v' + p2pool_version) not in p2pool_current_version.stdout

# --- Directories ---
# plan-approved: ansible-role-edit (plans/2026-05-10-monero-farm-hygiene.md, Group A residuals A4 per-instance data-dir + A5 wallet env)
- name: Create P2Pool home data directories (peer list cache)
  ansible.builtin.file:
    path: "/home/p2pool/.p2pool/{{ item }}"
    state: directory
    owner: p2pool
    group: p2pool
    mode: "0750"
  loop:
    - ""
    - mini

- name: Create P2Pool data directory
  ansible.builtin.file:
    path: "{{ p2pool_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create P2Pool per-instance data directories (A4 — isolates sidechain cache per mode)
  ansible.builtin.file:
    path: "/var/lib/p2pool/{{ item.mode }}"
    state: directory
    owner: p2pool
    group: p2pool
    mode: "0750"
  loop: "{{ p2pool_instances }}"
  loop_control:
    label: "{{ item.mode }}"

- name: Create P2Pool data-api directories
  ansible.builtin.file:
    path: "{{ p2pool_api_base }}/api-{{ item.mode }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  loop: "{{ p2pool_instances }}"
  loop_control:
    label: "{{ item.mode }}"

# --- Wallet env file (A5) — out of ExecStart, 0600 root:root, not in systemctl-cat output ---
# plan-approved: ansible-role-edit -- task-4785 p2pool-env tag
- name: Create /etc/monero-farm directory for env files
  ansible.builtin.file:
    path: /etc/monero-farm
    state: directory
    owner: root
    group: root
    mode: "0750"
  tags: ['p2pool-env']

# plan-approved: ansible-role-edit -- H-001 wallet leak fix (mr-hardass 2026-05-18)
- name: Template P2Pool wallet env file (loaded via EnvironmentFile by systemd PID 1, so mode 0600 root:root is OK; downstream User=exporter etc. still receive the env vars after privilege drop)
  ansible.builtin.copy:
    dest: /etc/monero-farm/p2pool-wallet.env
    content: |
      P2POOL_WALLET={{ monero_wallet_address }}
      MINER_ADDRESS={{ monero_wallet_address }}
    owner: root
    group: root
    mode: "0600"
  no_log: true
  # tag p2pool-env (task-4785): lets the H-001 wallet-env fix deploy in
  # isolation — `--tags p2pool-env` runs only the assert + dir + this template,
  # skipping the not-yet-idempotent binary download/extract tasks.
  tags: ['p2pool-env']
  notify:
    - restart p2pool-main
    - restart p2pool-mini
    - restart p2pool-nano
    - restart observer-exporter  # plan-approved: ansible-role-edit -- cross-role handler in monitoring/handlers/main.yml

# --- Systemd units ---
- name: Deploy p2pool systemd units
  ansible.builtin.template:
    src: p2pool.service.j2
    dest: "/etc/systemd/system/p2pool-{{ item.mode }}.service"
    mode: "0644"
  loop: "{{ p2pool_instances }}"
  loop_control:
    label: "{{ item.mode }}"
  notify:
    - reload systemd

- name: Enable and start p2pool instances
  ansible.builtin.systemd:
    name: "p2pool-{{ item.mode }}"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ p2pool_instances }}"
  loop_control:
    label: "{{ item.mode }}"
