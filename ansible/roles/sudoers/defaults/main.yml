---
# C2 — sudoers tightened to monero-farm operational scope only.
# Removed: bash, tee, cp, sed, curl, mv, chown, chmod, mkdir, install,
#          cat, head, tail, grep, find, stat, ls, diff, dpkg, apt-get,
#          mount, umount, exportfs, useradd, usermod, groupadd, visudo.
# Rationale: broad file-write + shell commands = trivial privilege escalation.
# "bash" NOPASSWD is equivalent to unrestricted root — never appropriate.
sudoers_user: josh
sudoers_nopasswd_commands:
  # Service management — start/stop/status monero-farm units only
  - /usr/bin/systemctl start monerod
  - /usr/bin/systemctl stop monerod
  - /usr/bin/systemctl restart monerod
  - /usr/bin/systemctl status monerod
  - /usr/bin/systemctl start p2pool-main
  - /usr/bin/systemctl stop p2pool-main
  - /usr/bin/systemctl restart p2pool-main
  - /usr/bin/systemctl status p2pool-main
  - /usr/bin/systemctl start p2pool-mini
  - /usr/bin/systemctl stop p2pool-mini
  - /usr/bin/systemctl restart p2pool-mini
  - /usr/bin/systemctl status p2pool-mini
  - /usr/bin/systemctl start p2pool-nano
  - /usr/bin/systemctl stop p2pool-nano
  - /usr/bin/systemctl restart p2pool-nano
  - /usr/bin/systemctl status p2pool-nano
  - /usr/bin/systemctl start p2pool-exporter
  - /usr/bin/systemctl stop p2pool-exporter
  - /usr/bin/systemctl restart p2pool-exporter
  - /usr/bin/systemctl status p2pool-exporter
  # Log reading — monero-farm units only
  - /usr/bin/journalctl -u monerod
  - /usr/bin/journalctl -u p2pool-main
  - /usr/bin/journalctl -u p2pool-mini
  - /usr/bin/journalctl -u p2pool-nano
  - /usr/bin/journalctl -u p2pool-exporter
  # Package management — Ansible needs this for role applies
  - /usr/bin/apt
  # Firewall — UFW status/allow/deny/reload (minimum-privilege)
  # sudoers(5) wildcard semantics: a `*` at the end of a Cmnd's args matches all
  # remaining command-line args. Listing a subcommand without `*` (e.g. just
  # `/usr/sbin/ufw allow`) requires the user to invoke it EXACTLY with no further
  # args — useless for real firewall rule management like `ufw allow 3333/tcp`.
  # Pattern: subcommand-only entry for no-arg invocations + `subcommand *` for
  # arg-bearing ones.
  #
  # Intentionally excluded (mr-hardass GATE 3 HIGH on PR #4, 2026-05-11):
  #   - reset / disable / enable: catastrophic firewall ops
  #   - delete *: a compromised josh account could remove protective rules
  #     (e.g. `sudo ufw delete allow out all`) to disrupt connectivity AND
  #     defang corrective measures. Removal of rules is operationally rare;
  #     ops should `ufw reset` + Ansible re-apply (out-of-band) to remove.
  - /usr/sbin/ufw status
  - /usr/sbin/ufw status *
  - /usr/sbin/ufw allow *
  - /usr/sbin/ufw deny *
  - /usr/sbin/ufw reload
  # Security tools
  - /usr/sbin/augenrules
  - /usr/sbin/auditctl
  - /usr/bin/cscli
  # Ansible — deploy role changes
  - /usr/bin/ansible-playbook
  - /usr/bin/ansible

# Host-specific additions (merged with defaults)
sudoers_extra_commands: []
# Example: ["/usr/bin/systemctl restart xmrig"]
