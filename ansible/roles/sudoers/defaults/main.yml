---
sudoers_user: josh
sudoers_nopasswd_commands:
  # Service management
  - /usr/bin/systemctl
  - /usr/bin/journalctl
  # Package management
  - /usr/bin/apt
  - /usr/bin/apt-get
  - /usr/bin/dpkg
  # File operations
  - /usr/bin/chown
  - /usr/bin/chmod
  - /usr/bin/mkdir
  - /usr/bin/cp
  - /usr/bin/mv
  - /usr/bin/tee
  - /usr/bin/curl
  - /usr/bin/bash
  - /usr/bin/install
  # File reading
  - /usr/bin/cat
  - /usr/bin/head
  - /usr/bin/tail
  - /usr/bin/grep
  - /usr/bin/find
  - /usr/bin/stat
  - /usr/bin/ls
  - /usr/bin/diff
  - /usr/bin/sed
  # Network
  - /usr/sbin/ufw
  - /usr/sbin/sysctl
  - /usr/bin/ss
  # User management
  - /usr/sbin/useradd
  - /usr/sbin/usermod
  - /usr/sbin/groupadd
  # Security tools
  - /usr/sbin/visudo
  - /usr/sbin/augenrules
  - /usr/sbin/auditctl
  - /usr/bin/cscli
  - /usr/bin/openssl
  # NFS
  - /usr/bin/mount
  - /usr/bin/umount
  - /usr/sbin/exportfs
  # Ansible
  - /usr/bin/ansible-playbook
  - /usr/bin/ansible

# Host-specific additions (merged with defaults)
sudoers_extra_commands: []
# Example: ["/usr/bin/docker", "/usr/bin/nvidia-smi"]
